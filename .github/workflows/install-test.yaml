name: Installation Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  install-test:
    runs-on: ${{ matrix.os }}
    name: Install on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      # DatastreamDSWS2R (GitHub Remote) imports dplyr but omits it from its
      # DESCRIPTION, so pak (which sees no dependency) builds it before dplyr
      # is installed and lazy-load fails. Pre-install dplyr into the library
      # pak uses (R_LIBS_USER) so it is present when DatastreamDSWS2R builds.
      - name: Pre-install dplyr (DatastreamDSWS2R undeclared build dep)
        run: install.packages("dplyr")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::remotes
          needs: check

      - name: Install package via remotes
        run: |
          Rscript -e "remotes::install_local('.', force = TRUE)"

      - name: Verify package loads
        run: |
          Rscript -e "library(Refinitiv); cat('Package successfully installed and loaded.\n')"
