name: Installation Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  install-test:
    runs-on: ${{ matrix.os }}
    name: Install on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::remotes
          needs: check

      - name: Install package via remotes
        run: |
          Rscript -e "remotes::install_local('.', force = TRUE)"

      - name: Verify package loads
        run: |
          Rscript -e "library(Refinitiv); cat('Package successfully installed and loaded.\n')"
