name: test-coverage

on:
  push:
    branches: [main, master]
  pull_request:

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # DatastreamDSWS2R (GitHub Remote) imports dplyr but omits it from its
      # DESCRIPTION, so pak (which sees no dependency) builds it before dplyr
      # is installed and lazy-load fails. Pre-install dplyr into the library
      # pak uses (R_LIBS_USER) so it is present when DatastreamDSWS2R builds.
      - name: Pre-install dplyr (DatastreamDSWS2R undeclared build dep)
        run: install.packages("dplyr")
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov, filename = "coverage.xml")
        shell: Rscript {0}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: true
